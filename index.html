<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReturHub - Online Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* RESET & KUNCI LAYAR */
        html, body {
            margin: 0; padding: 0; width: 100%; overflow-x: hidden; touch-action: pan-y;
            font-family: 'Poppins', sans-serif; background-color: #0f172a; color: #f8fafc;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #1e3a8a, #2563eb); padding: 15px; text-align: center;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
        }
        header h1 { margin: 0; font-size: 20px; font-weight: 700; }
        header p { margin: 2px 0 0; font-size: 11px; color: #bfdbfe; }

        /* TABS */
        .nav-tabs { display: flex; justify-content: center; gap: 8px; padding: 15px; }
        .tab-btn {
            flex: 1; background: #1e293b; color: #94a3b8; border: 1px solid #334155;
            padding: 10px; border-radius: 10px; font-weight: 600; font-size: 12px; cursor: pointer;
        }
        .tab-btn.active { background: rgba(37, 99, 235, 0.15); color: #3b82f6; border-color: #3b82f6; }

        .container { padding: 0 15px 80px 15px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* KARTU FORM & FILTER */
        .card { background: #1e293b; border-radius: 14px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        h2 { margin-top: 0; font-size: 16px; color: #f8fafc; margin-bottom: 12px; }

        /* INPUT & SELECT */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 5px; }
        input, select {
            width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155;
            border-radius: 8px; color: white; font-family: 'Poppins', sans-serif; font-size: 13px; outline: none;
        }
        input:focus, select:focus { border-color: #3b82f6; }
        .input-row { display: flex; gap: 10px; }
        .input-row .form-group { flex: 1; }

        /* BUTTONS */
        .btn-primary {
            width: 100%; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white;
            border: none; padding: 12px; border-radius: 10px; font-weight: 600; font-size: 13px; margin-top: 5px;
            cursor: pointer;
        }
        .btn-action {
            background: #3b82f6; border: none; color: white; padding: 6px 10px;
            border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer;
        }
        .btn-danger {
            background: #dc2626; border: none; color: white; padding: 10px; width: 100%;
            border-radius: 10px; font-weight: 600; font-size: 13px; margin-top: 10px; cursor: pointer;
        }

        /* FILTER BOX */
        .filter-container { display: flex; gap: 8px; margin-bottom: 10px; }
        .filter-container select { flex: 1; padding: 8px; font-size: 12px; }

        /* SEARCH BAR */
        .search-box { position: relative; margin-bottom: 15px; }
        .search-box input { padding-left: 35px; border-color: #3b82f6; }
        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 16px; }

        /* KARTU LIST DATA */
        .compact-card {
            background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 10px;
            margin-bottom: 10px; position: relative; border-left: 4px solid #3b82f6;
        }
        .compact-card.danger { border-left-color: #dc2626; background: rgba(220, 38, 38, 0.05); }
        .compact-card.warning { border-left-color: #eab308; background: rgba(234, 179, 8, 0.05); }

        .c-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .c-title { font-size: 14px; font-weight: 700; line-height: 1.2; color: #f1f5f9; padding-right: 10px;}
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
        .badge.safe { background: #064e3b; color: #34d399; }
        .badge.warn { background: #713f12; color: #fde047; }
        .badge.dang { background: #7f1d1d; color: #fca5a5; }

        .c-body { font-size: 11px; color: #94a3b8; display: flex; flex-direction: column; gap: 4px; }
        .c-row { display: flex; justify-content: space-between; }
        .highlight { color: #60a5fa; font-weight: 600; }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 999; backdrop-filter: blur(5px); align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #1e293b; width: 90%; max-width: 350px; padding: 20px; border-radius: 16px; border: 1px solid #3b82f6; }
        .btn-close-modal { background: transparent; color: #94a3b8; border: 1px solid #475569; width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight:600; cursor: pointer;}

        /* TOAST & LOADING */
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #10b981; color: white; padding: 10px 20px; border-radius: 20px; font-size: 12px; font-weight: 600; transition: 0.3s; z-index: 1000; }
        #toast.show { transform: translateX(-50%) translateY(0); }
        .empty-state { text-align: center; padding: 20px; color: #64748b; font-size: 13px; }
        
        #loadingScreen {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); z-index: 9999; align-items: center; justify-content: center;
            flex-direction: column; color: #3b82f6; font-weight: 600; font-size: 14px;
        }
        .spinner {
            border: 4px solid rgba(59, 130, 246, 0.3); border-top: 4px solid #3b82f6;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="spinner"></div>
        <div id="loadingText">Menghubungkan ke Google Sheet...</div>
    </div>

    <header>
        <h1>ReturHub</h1>
        <p>🔴 Live Sync - Google Sheets</p>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard')">Notif 🔔</button>
        <button class="tab-btn" onclick="switchTab('input')">Input ✍️</button>
        <button class="tab-btn" onclick="switchTab('list')">Filter & Cari 🔍</button>
    </div>

    <div class="container">
        <div id="page-dashboard" class="page active">
            <div class="card">
                <h2>🚨 Butuh Tindakan Segera</h2>
                <div id="actionList"></div>
            </div>
        </div>

        <div id="page-input" class="page">
            <div class="card">
                <h2>📦 Tambah Barang Baru</h2>
                <div class="form-group"><label>Nama Produk</label><input type="text" id="nama" placeholder="Contoh: Chitato Sapi Panggang"></div>
                <datalist id="modisHistory"></datalist>
                <div class="form-group"><label>Jenis Modis</label><input type="text" id="modis" list="modisHistory" placeholder="Ketik/Pilih Modis"></div>
                <div class="input-row">
                    <div class="form-group"><label>Shelving (No Rak)</label><input type="number" id="shelf" placeholder="Contoh: 3"></div>
                    <div class="form-group"><label>Baris</label><input type="number" id="baris" placeholder="Contoh: 1"></div>
                </div>
                <div class="input-row">
                    <div class="form-group"><label>Tgl Expired</label><input type="date" id="expDate"></div>
                    <div class="form-group"><label>Tarik H- (Hari)</label><input type="number" id="tarikDays" placeholder="Contoh: 60"></div>
                </div>
                <button class="btn-primary" onclick="simpanBarang()">Simpan & Upload Data</button>
            </div>
        </div>

        <div id="page-list" class="page">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>🔍 Letak Barang</h2>
                    <button class="btn-action" style="background:#059669; padding:8px 12px; margin-top:0;" onclick="tarikDataGoogleSheet()">🔄 Refresh Data</button>
                </div>
                <div class="search-box">
                    <span class="search-icon">🔎</span>
                    <input type="text" id="searchInput" placeholder="Ketik nama produk..." onkeyup="terapkanFilter()">
                </div>
                <div class="filter-container">
                    <select id="filterModis" onchange="updateFilterShelf()"><option value="">Semua Modis</option></select>
                    <select id="filterShelf" onchange="terapkanFilter()"><option value="">Semua Shelving</option></select>
                </div>
                <div id="allList"></div>
            </div>

            <div class="card" style="border-color: #dc2626; background: rgba(220, 38, 38, 0.05); text-align: center; margin-top: 30px;">
                <h3 style="color: #fca5a5; margin-top: 0; font-size: 14px;">⚠️ Zona Bahaya</h3>
                <p style="font-size: 11px; color: #94a3b8; margin-bottom: 15px;">Gunakan tombol ini jika ingin menghapus seluruh data barang untuk memulai dari nol.</p>
                <button class="btn-danger" style="margin-top: 0;" onclick="resetSemuaData()">🚨 Reset Semua Data</button>
            </div>
        </div>
    </div>

    <div id="modalTindakan" class="modal-overlay">
        <div class="modal-content">
            <h2>🔄 Tindakan Barang</h2>
            <p id="modalNamaBarang" style="font-size: 13px; font-weight: bold; color: #60a5fa; margin-bottom: 15px;"></p>
            <input type="hidden" id="editId">
            <div class="form-group"><label>Ganti Tanggal Expired Baru</label><input type="date" id="editExpDate"></div>
            <div class="form-group"><label>Masa Tarik Baru (H- Hari)</label><input type="number" id="editTarikDays"></div>
            
            <button class="btn-primary" onclick="simpanTindakan()">Simpan Pembaruan</button>
            <button class="btn-danger" onclick="hapusBarangDariSistem()">🗑️ Hapus Permanen Barang Ini</button>
            <button class="btn-close-modal" onclick="tutupModal()">Batal</button>
        </div>
    </div>

    <div id="toast">Notifikasi</div>

    <script>
        // URL GOOGLE SHEET MILIKMU SUDAH TERPASANG DI SINI:
        const URL_GOOGLE_SHEET = 'https://script.google.com/macros/s/AKfycbwA3uvzmYyjttATknVVWk8dzkCu3se9byGBkZ6h93ZaJhYquPG_8zHyNI6rpkLDYc-v/exec';
        
        let dbBarang = [];

        // Tarik data saat aplikasi pertama kali dibuka
        window.onload = () => tarikDataGoogleSheet();

        async function tarikDataGoogleSheet() {
            setLoading(true, "Mengambil data dari Google Sheet...");
            try {
                const response = await fetch(URL_GOOGLE_SHEET);
                dbBarang = await response.json();
                initApp();
                showToast("Data tersinkronisasi!");
            } catch (error) {
                console.error(error);
                showToast("Gagal mengambil data. Cek koneksi internet.");
            }
            setLoading(false);
        }

        async function pushDataKeGoogleSheet() {
            setLoading(true, "Menyimpan ke Google Sheet...");
            try {
                await fetch(URL_GOOGLE_SHEET, {
                    method: 'POST',
                    body: JSON.stringify(dbBarang)
                });
                initApp();
                terapkanFilter(); // Refresh tampilan list kalau lagi di tab list
                showToast("Berhasil update ke Sheet!");
            } catch (error) {
                console.error(error);
                showToast("Gagal mengupload data!");
            }
            setLoading(false);
        }

        function setLoading(isActive, text = "") {
            document.getElementById('loadingScreen').style.display = isActive ? 'flex' : 'none';
            document.getElementById('loadingText').innerText = text;
        }

        function initApp() {
            updateModisDatalist();
            updateFilterDropdowns();
            renderDashboard();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('page-' + tabId).classList.add('active');
            event.target.classList.add('active');

            if(tabId === 'dashboard') renderDashboard();
            if(tabId === 'list') {
                document.getElementById('searchInput').value = '';
                document.getElementById('filterModis').value = '';
                updateFilterShelf();
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.className = 'show';
            setTimeout(() => { toast.className = ''; }, 2500);
        }

        function formatTanggal(tglString) {
            return new Date(tglString).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function hitungSelisihHari(tglTujuan) {
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(tglTujuan); target.setHours(0,0,0,0);
            return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        }

        // --- MANAJEMEN DATA ---
        async function simpanBarang() {
            const nama = document.getElementById('nama').value;
            const modis = document.getElementById('modis').value;
            const shelf = document.getElementById('shelf').value;
            const baris = document.getElementById('baris').value;
            const expDate = document.getElementById('expDate').value;
            const tarikDays = document.getElementById('tarikDays').value;

            if(!nama || !modis || !shelf || !baris || !expDate || !tarikDays) {
                alert("Isi semua data lokasinya ya!"); return;
            }

            dbBarang.push({
                id: Date.now().toString(),
                nama, modis, shelf: parseInt(shelf), baris: parseInt(baris), 
                expDate, tarikDays: parseInt(tarikDays)
            });

            ['nama','modis','shelf','baris','expDate','tarikDays'].forEach(id => document.getElementById(id).value = '');
            
            // Push ke awan
            await pushDataKeGoogleSheet();
        }

        // --- FILTER & RENDER ---
        function updateModisDatalist() {
            const unikModis = [...new Set(dbBarang.map(i => i.modis))];
            document.getElementById('modisHistory').innerHTML = unikModis.map(m => `<option value="${m}">`).join('');
        }

        function updateFilterDropdowns() {
            const optModis = document.getElementById('filterModis');
            const unikModis = [...new Set(dbBarang.map(i => i.modis))].sort();
            let currentVal = optModis.value;
            optModis.innerHTML = '<option value="">Semua Modis</option>' + unikModis.map(m => `<option value="${m}">${m}</option>`).join('');
            optModis.value = currentVal; 
            updateFilterShelf();
        }

        function updateFilterShelf() {
            const pilihModis = document.getElementById('filterModis').value;
            const optShelf = document.getElementById('filterShelf');
            let filteredShelfData = pilihModis !== '' ? dbBarang.filter(i => i.modis === pilihModis) : dbBarang;
            const unikShelf = [...new Set(filteredShelfData.map(i => i.shelf))].sort((a,b) => a - b);
            
            optShelf.innerHTML = '<option value="">Semua Shelving</option>' + unikShelf.map(s => `<option value="${s}">Shelving ${s}</option>`).join('');
            terapkanFilter();
        }

        function terapkanFilter() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const fModis = document.getElementById('filterModis').value;
            const fShelf = document.getElementById('filterShelf').value;
            const listContainer = document.getElementById('allList');
            listContainer.innerHTML = '';

            let dataSaring = dbBarang.filter(item => {
                return item.nama.toLowerCase().includes(query) && 
                       (fModis === '' || item.modis === fModis) && 
                       (fShelf === '' || item.shelf.toString() === fShelf);
            });

            dataSaring.sort((a, b) => {
                if(a.modis !== b.modis) return a.modis.localeCompare(b.modis);
                if(a.shelf !== b.shelf) return a.shelf - b.shelf;
                return a.baris - b.baris;
            });

            if(dataSaring.length === 0) {
                listContainer.innerHTML = `<div class="empty-state">Data tidak ditemukan.</div>`; return;
            }

            dataSaring.forEach(item => {
                const sisaHari = hitungSelisihHari(item.expDate);
                let tipe = 'safe', txtBadge = '✅ Aman', classCard = '';
                if (sisaHari < 0) { tipe = 'dang'; txtBadge = '❌ Expired'; classCard = 'danger'; }
                else if (sisaHari <= item.tarikDays) { tipe = 'warn'; txtBadge = `⚠️ Tarik (H-${sisaHari})`; classCard = 'warning'; }

                listContainer.innerHTML += `
                    <div class="compact-card ${classCard}">
                        <div class="c-header">
                            <div class="c-title">${item.nama}</div>
                            <span class="badge ${tipe}">${txtBadge}</span>
                        </div>
                        <div class="c-body">
                            <div class="c-row">
                                <span>📍 <span class="highlight">${item.modis}</span> | Shelf: <b>${item.shelf}</b> | Baris: <b>${item.baris}</b></span>
                                <button class="btn-action" onclick="bukaModalTindakan('${item.id}')">Edit</button>
                            </div>
                            <div class="c-row">
                                <span>⏳ Exp: ${formatTanggal(item.expDate)} (Tarik H-${item.tarikDays})</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function renderDashboard() {
            const listContainer = document.getElementById('actionList');
            listContainer.innerHTML = '';
            
            let dataNotif = dbBarang.filter(i => hitungSelisihHari(i.expDate) <= i.tarikDays);
            dataNotif.sort((a,b) => new Date(a.expDate) - new Date(b.expDate)); 

            if(dataNotif.length === 0) {
                listContainer.innerHTML = `<div class="empty-state">✨<br>Aman bro! Nggak ada jadwal narik barang.</div>`; return;
            }

            dataNotif.forEach(item => {
                const sisaHari = hitungSelisihHari(item.expDate);
                let tipe = (sisaHari < 0) ? 'dang' : 'warn', txtBadge = (sisaHari < 0) ? '🔴 KADALUARSA' : `🟡 TARIK (H-${sisaHari})`, classCard = (sisaHari < 0) ? 'danger' : 'warning';

                listContainer.innerHTML += `
                    <div class="compact-card ${classCard}">
                        <div class="c-header"><div class="c-title">${item.nama}</div><span class="badge ${tipe}">${txtBadge}</span></div>
                        <div class="c-body">
                            <span>📍 ${item.modis} | S: ${item.shelf} | B: ${item.baris}</span>
                            <span>⏳ Exp: ${formatTanggal(item.expDate)}</span>
                            <button class="btn-action" style="margin-top:6px; background:#475569" onclick="bukaModalTindakan('${item.id}')">🔄 Tindakan</button>
                        </div>
                    </div>
                `;
            });
        }

        function bukaModalTindakan(id) {
            const item = dbBarang.find(x => x.id === id);
            document.getElementById('editId').value = item.id;
            document.getElementById('modalNamaBarang').innerText = `${item.nama} (${item.modis} S:${item.shelf} B:${item.baris})`;
            document.getElementById('editExpDate').value = item.expDate;
            document.getElementById('editTarikDays').value = item.tarikDays;
            document.getElementById('modalTindakan').classList.add('active');
        }

        function tutupModal() { document.getElementById('modalTindakan').classList.remove('active'); }

        async function simpanTindakan() {
            const id = document.getElementById('editId').value;
            const newExp = document.getElementById('editExpDate').value;
            const newTarik = document.getElementById('editTarikDays').value;

            if(!newExp || !newTarik) return alert("Isi formnya dulu!");

            let index = dbBarang.findIndex(x => x.id === id);
            if(index !== -1) {
                dbBarang[index].expDate = newExp;
                dbBarang[index].tarikDays = parseInt(newTarik);
                tutupModal();
                await pushDataKeGoogleSheet();
            }
        }

        async function hapusBarangDariSistem() {
            const id = document.getElementById('editId').value;
            if(confirm("Yakin barang ini sudah ditarik dan mau dihapus permanen dari sistem?")) {
                dbBarang = dbBarang.filter(x => x.id !== id);
                tutupModal();
                await pushDataKeGoogleSheet();
            }
        }

        // FUNGSI BARU: RESET SEMUA DATA
        async function resetSemuaData() {
            const yakinPertama = confirm("🚨 PERINGATAN BAHAYA 🚨\n\nApakah kamu YAKIN ingin MENGHAPUS SEMUA DATA BARANG?");
            if (yakinPertama) {
                const yakinKedua = confirm("TINDAKAN INI TIDAK BISA DIBATALKAN!\n\nData di aplikasi dan Google Sheet akan hilang PERMANEN. Lanjutkan?");
                if (yakinKedua) {
                    dbBarang = []; // Kosongkan array secara lokal
                    await pushDataKeGoogleSheet(); // Push kekosongan ini ke awan
                    showToast("Sapu jagat berhasil! Semua data bersih.");
                }
            }
        }
    </script>
</body>
</html>
