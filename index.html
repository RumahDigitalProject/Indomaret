<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retail Inventory</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#eef1f5;
}

header{
background:#111827;
color:white;
padding:15px;
font-size:20px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin:4px;
}

button:hover{
background:#1d4ed8;
}

input{
padding:8px;
margin:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#1f2937;
color:white;
}

#reader{
width:320px;
margin-top:10px;
}

.alert{
background:#fff3cd;
padding:10px;
border-left:6px solid orange;
border-radius:6px;
}

</style>

</head>

<body>

<header>
Retail Inventory Dashboard
</header>

<div class="container">

<div class="card alert">

<b>Barang Mendekati Expired</b>

<div id="alertList">
Belum ada barang mendekati expired
</div>

</div>

<div class="card">

<h3>Tambah Barang</h3>

<button onclick="startScanner()">Scan Barcode</button>

<div id="reader"></div>

</div>

<div class="card" id="formBarang" style="display:none">

<h3>Data Barang</h3>

<input id="barcode" placeholder="Barcode" readonly>

<input id="nama" placeholder="Nama Barang">

<input id="rak" placeholder="Rak">

<input id="baris" placeholder="Baris">

<input id="stok" type="number" placeholder="Jumlah">

<br>

<label>Expired</label>

<input id="exp" type="date">

<label>Hari Tarik Display</label>

<input id="warning" placeholder="Contoh: 30">

<br>

<button onclick="saveItem()">Simpan Barang</button>

</div>

<div class="card">

<h3>Daftar Barang</h3>
<h3>Filter Barang</h3>

<select id="filterRak" onchange="applyFilter()">
<option value="">Semua Rak</option>
</select>

<select id="filterBaris" onchange="applyFilter()">
<option value="">Semua Baris</option>
</select>
<h3>Cari Barang</h3>

<div style="display:flex;gap:5px;align-items:center">

<input id="searchInput"
placeholder="Cari nama barang..."
style="flex:1"
onkeydown="handleEnter(event)">

<button onclick="clearSearch()">❌</button>

<button onclick="startSearchScanner()">Scan</button>

</div>

<div id="readerSearch"></div>

<div id="searchResult"></div>
<table>

<thead>

<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Rak</th>
<th>Baris</th>
<th>Stok</th>
<th>Expired</th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

function handleEnter(e){
if(e.key === "Enter"){
searchItem()
}
}

function clearSearch(){

document.getElementById("searchInput").value = ""
document.getElementById("searchResult").innerHTML = ""

}
/* FILTER BARANG */
function loadFilterOptions(){

let rakSet = new Set()
let barisSet = new Set()

items.forEach(i=>{
rakSet.add(i.rak)
barisSet.add(i.baris)
})

let rakSelect = document.getElementById("filterRak")
let barisSelect = document.getElementById("filterBaris")

rakSelect.innerHTML = '<option value="">Semua Rak</option>'
barisSelect.innerHTML = '<option value="">Semua Baris</option>'

rakSet.forEach(r=>{
rakSelect.innerHTML += `<option value="${r}">${r}</option>`
})

barisSet.forEach(b=>{
barisSelect.innerHTML += `<option value="${b}">${b}</option>`
})

}

function applyFilter(){

let rak = document.getElementById("filterRak").value
let baris = document.getElementById("filterBaris").value

let table = document.getElementById("table")

table.innerHTML=""

items.forEach(i=>{

if(
(rak=="" || i.rak==rak) &&
(baris=="" || i.baris==baris)
){

table.innerHTML += `

<tr>
<td>${i.barcode}</td>
<td>${i.nama}</td>
<td>${i.rak}</td>
<td>${i.baris}</td>
<td>${i.stok}</td>
<td>${i.exp}</td>
</tr>

`

}

})

}
/* DATABASE */

let items = JSON.parse(localStorage.getItem("items")) || []

function saveDB(){

localStorage.setItem("items",JSON.stringify(items))

}

/* SIMPAN BARANG */

function saveItem(){

let item={

barcode:barcode.value,
nama:nama.value,
rak:rak.value,
baris:baris.value,
stok:stok.value,
exp:exp.value,
warning:warning.value

}

let exist = items.find(x=>x.barcode==barcode.value)

if(exist){

Object.assign(exist,item)

}else{

items.push(item)

}

saveDB()

loadItems()

alert("Barang berhasil disimpan")

/* =========================
RESET SETELAH SIMPAN
========================= */

// kosongkan semua input
barcode.value=""
nama.value=""
rak.value=""
baris.value=""
stok.value=""
exp.value=""
warning.value=""

// sembunyikan form
document.getElementById("formBarang").style.display="none"

// (opsional) kosongkan tampilan scanner
document.getElementById("reader").innerHTML=""

}

/* LOAD BARANG */

function loadItems(){

let table=document.getElementById("table")

table.innerHTML=""

items.forEach(i=>{

table.innerHTML+=`

<tr>

<td>${i.barcode}</td>
<td>${i.nama}</td>
<td>${i.rak}</td>
<td>${i.baris}</td>
<td>${i.stok}</td>
<td>${i.exp}</td>

</tr>

`

})

checkExpired()
loadFilterOptions()

}

/* CEK EXPIRED */

function checkExpired(){

let today=new Date()
let panel=document.getElementById("alertList")

panel.innerHTML=""

let found=false

items.forEach(i=>{

let expDate=new Date(i.exp)
let diff = Math.ceil((expDate - today) / (1000 * 60 * 60 * 24))
if(diff > 0 && diff <= i.warning){
if(diff <= 0){
  // barang sudah expired (merah)
}
else if(diff <= i.warning){
  // hampir expired (kuning)
}
found=true

panel.innerHTML+=`

<div style="
background:#fff3cd;
padding:10px;
margin-top:8px;
border-radius:8px;
border-left:5px solid orange;
">

<b>${i.nama}</b> (H-${Math.floor(diff)})<br>
Rak ${i.rak} Baris ${i.baris}

<br><br>

<button onclick="openUpdateExp('${i.barcode}')">✔ Update Exp</button>

</div>

`

}

})

if(!found){
panel.innerHTML="Tidak ada barang mendekati expired"
}

}

/* Tindakan exp */
function markChecked(barcodeValue){

let item = items.find(x=>x.barcode==barcodeValue)

if(item){

// trik: geser tanggal expired 1 hari biar keluar dari notif
let newDate = new Date(item.exp)
newDate.setDate(newDate.getDate() + 1)

item.exp = newDate.toISOString().split("T")[0]

saveDB()
loadItems()

alert("Barang sudah ditandai (tidak muncul di notifikasi)")

}

}
/* update exp */
let currentBarcode = null

function openUpdateExp(barcodeValue){

currentBarcode = barcodeValue

document.getElementById("popupExp").style.display="flex"

}

function closePopup(){

document.getElementById("popupExp").style.display="none"

}

function saveNewExp(){

let newExp = document.getElementById("newExp").value

if(newExp==""){
alert("Isi tanggal dulu!")
return
}

let item = items.find(x=>x.barcode==currentBarcode)

if(item){

item.exp = newExp

saveDB()
loadItems()

alert("Expired berhasil diperbarui")

closePopup()

}

}
/* LOAD ITEM JIKA SUDAH ADA */

function loadItem(barcodeValue){

let item=items.find(x=>x.barcode==barcodeValue)

if(item){

nama.value=item.nama
rak.value=item.rak
baris.value=item.baris
stok.value=item.stok
exp.value=item.exp
warning.value=item.warning

alert("Data barang ditemukan")

}else{

nama.value=""
rak.value=""
baris.value=""
stok.value=""
exp.value=""
warning.value="30"

alert("Barang baru, silakan isi data")

}

}

/* SCANNER */

let scanner

function startScanner(){

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode: "environment" },
{ fps:10, qrbox:250 },
(code)=>{

barcode.value = code

scanner.stop()

document.getElementById("formBarang").style.display="block"

loadItem(code)

}
)

}

/* INIT */

loadItems()

/* =========================
SEARCH BY NAMA
========================= */

function searchItem(){

let key = document.getElementById("searchInput").value.toLowerCase()

let result = document.getElementById("searchResult")

result.innerHTML = ""

if(key === ""){
result.innerHTML = "<i>Masukkan nama barang...</i>"
return
}

let found = false

items.forEach(i=>{

if(i.nama.toLowerCase().includes(key)){

found = true

result.innerHTML += `

<div style="
background:white;
padding:12px;
margin-top:8px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1)
">

<b style="font-size:16px">${i.nama}</b><br><br>

Barcode : ${i.barcode} <br>
Rak : ${i.rak} <br>
Baris : ${i.baris} <br>
Stok : ${i.stok} <br>
Expired : ${i.exp} <br>
Tarik Display : H-${i.warning}

<br><br>

<button onclick="editItem('${i.barcode}')">✏️ Edit</button>
<button onclick="deleteItem('${i.barcode}')">🗑 Hapus</button>

</div>

`

}

})

if(!found){
result.innerHTML = "<b>Barang tidak ditemukan</b>"
}

}

function editItem(barcodeValue){

let item = items.find(x=>x.barcode==barcodeValue)

if(item){

// tampilkan form
document.getElementById("formBarang").style.display="block"

// isi otomatis
barcode.value=item.barcode
nama.value=item.nama
rak.value=item.rak
baris.value=item.baris
stok.value=item.stok
exp.value=item.exp
warning.value=item.warning

// scroll ke form biar kelihatan
window.scrollTo({top:0,behavior:"smooth"})

}

}

function deleteItem(barcodeValue){

if(confirm("Yakin hapus barang ini?")){

items = items.filter(x=>x.barcode!=barcodeValue)

saveDB()
loadItems()
searchItem()

alert("Barang berhasil dihapus")

}

}

function pilihBarang(barcodeValue){

let item = items.find(x=>x.barcode==barcodeValue)

if(item){

alert(
"Nama: " + item.nama + "\n" +
"Rak: " + item.rak + "\n" +
"Baris: " + item.baris + "\n" +
"Stok: " + item.stok + "\n" +
"Expired: " + item.exp
)

}

}

let searchScanner

function startSearchScanner(){

searchScanner = new Html5Qrcode("readerSearch")

searchScanner.start(
{ facingMode: "environment" },
{ fps:10, qrbox:250 },
(code)=>{

searchScanner.stop()

let item = items.find(x=>x.barcode==code)

if(item){

alert(
"Nama: " + item.nama + "\n" +
"Rak: " + item.rak + "\n" +
"Baris: " + item.baris + "\n" +
"Stok: " + item.stok + "\n" +
"Expired: " + item.exp
)

}else{

alert("Barang tidak ditemukan")

}

}
)

}
  
</script>

</body>
<div id="popupExp" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
">

<div style="
background:white;
padding:20px;
border-radius:10px;
width:300px;
">

<h3>Update Expired</h3>

<input type="date" id="newExp">

<br><br>

<button onclick="saveNewExp()">Simpan</button>
<button onclick="closePopup()">Batal</button>

</div>

</div>
</html>
