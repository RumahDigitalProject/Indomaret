<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retail Inventory Manager</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#222;
color:white;
padding:15px;
font-size:22px;
}

.container{
padding:20px;
}

button{
padding:10px 15px;
margin:5px;
background:#3498db;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

input{
padding:10px;
margin:5px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#333;
color:white;
}

#reader{
width:350px;
}

</style>

</head>

<body>

<header>
Retail Inventory Manager
</header>

<div class="container">

<div class="card">

<button onclick="show('add')">Tambah Barang</button>
<button onclick="show('scan')">Scan Barcode</button>
<button onclick="show('stock')">Stok Barang</button>
<button onclick="show('expired')">Hampir Expired</button>

</div>

<!-- TAMBAH BARANG -->

<div class="card" id="add">

<h3>Tambah Barang</h3>

<input id="barcode" placeholder="Barcode">

<input id="nama" placeholder="Nama Barang">

<input id="stok" type="number" placeholder="Jumlah Stok">

<input id="rak" placeholder="Rak">

<input id="baris" placeholder="Baris">

<br>

<label>Expired</label>
<input id="exp" type="date">

<br>

<button onclick="addItem()">Simpan</button>

</div>

<!-- SCAN -->

<div class="card" id="scan" style="display:none">

<h3>Scan Barcode</h3>

<div id="reader"></div>

<p>Barcode: <span id="scanResult"></span></p>

<button onclick="startScanner()">Mulai Scan</button>

</div>

<!-- STOK -->

<div class="card" id="stock" style="display:none">

<h3>Daftar Stok</h3>

<input id="search" placeholder="Cari..." onkeyup="searchItem()">

<table>

<thead>

<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Stok</th>
<th>Rak</th>
<th>Baris</th>
<th>Expired</th>
</tr>

</thead>

<tbody id="stockTable"></tbody>

</table>

</div>

<!-- EXPIRED -->

<div class="card" id="expired" style="display:none">

<h3>Barang Hampir Expired (H-30)</h3>

<table>

<thead>
<tr>
<th>Nama</th>
<th>Rak</th>
<th>Baris</th>
<th>Expired</th>
</tr>
</thead>

<tbody id="expTable"></tbody>

</table>

</div>

</div>

<script>

/* DATABASE */

let items = JSON.parse(localStorage.getItem("items")) || [];

function saveDB(){
localStorage.setItem("items",JSON.stringify(items));
}

/* TAMBAH BARANG */

function addItem(){

let item={
barcode:barcode.value,
nama:nama.value,
stok:stok.value,
rak:rak.value,
baris:baris.value,
exp:exp.value
};

items.push(item);

saveDB();

alert("Barang tersimpan");

loadStock();

}

/* LOAD STOK */

function loadStock(){

let table=document.getElementById("stockTable");

table.innerHTML="";

items.forEach(i=>{

table.innerHTML+=`

<tr>

<td>${i.barcode}</td>
<td>${i.nama}</td>
<td>${i.stok}</td>
<td>${i.rak}</td>
<td>${i.baris}</td>
<td>${i.exp}</td>

</tr>

`;

});

checkExpired();

}

/* SEARCH */

function searchItem(){

let key=search.value.toLowerCase();

document.querySelectorAll("#stockTable tr").forEach(r=>{

r.style.display=r.innerText.toLowerCase().includes(key) ? "" : "none";

});

}

/* EXPIRED */

function checkExpired(){

let today=new Date();

let table=document.getElementById("expTable");

table.innerHTML="";

items.forEach(i=>{

let expDate=new Date(i.exp);

let diff=(expDate-today)/(1000*60*60*24);

if(diff<=30){

table.innerHTML+=`

<tr>

<td>${i.nama}</td>
<td>${i.rak}</td>
<td>${i.baris}</td>
<td>${i.exp}</td>

</tr>

`;

}

});

}

/* SCANNER */

let scanner;

function startScanner(){

scanner = new Html5Qrcode("reader");

scanner.start(
{ facingMode: "environment" },
{
fps:10,
qrbox:250
},
(code)=>{

scanResult.innerText=code;
barcode.value=code;

scanner.stop();

}
);

}

/* NAVIGASI */

function show(id){

["add","scan","stock","expired"].forEach(s=>{
document.getElementById(s).style.display="none";
});

document.getElementById(id).style.display="block";

}

/* INIT */

loadStock();

</script>

</body>
</html>
