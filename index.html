<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retail Inventory Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f1f3f6;
}

header{
background:#1f2937;
color:white;
padding:15px 20px;
font-size:20px;
}

.container{
padding:20px;
}

/* ALERT PANEL */

.alert-panel{
background:#fff3cd;
border-left:6px solid #f59e0b;
padding:15px;
margin-bottom:20px;
border-radius:8px;
}

.alert-title{
font-weight:bold;
margin-bottom:10px;
}

.alert-item{
padding:8px;
border-bottom:1px solid #eee;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

input{
padding:10px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #eee;
padding:10px;
}

th{
background:#111827;
color:white;
}

#reader{
width:320px;
}

</style>

</head>

<body>

<header>
Retail Inventory Dashboard
</header>

<div class="container">

<!-- ALERT EXP PANEL -->

<div class="alert-panel">

<div class="alert-title">
⚠ Barang Mendekati Expired
</div>

<div id="alertList">
Belum ada barang mendekati expired
</div>

</div>

<!-- MENU -->

<div class="card">

<button onclick="show('add')">Tambah Barang</button>
<button onclick="show('scan')">Scan Barcode</button>
<button onclick="show('stock')">Stok Barang</button>

</div>

<!-- TAMBAH -->

<div class="card" id="add">

<h3>Tambah Barang</h3>

<input id="barcode" placeholder="Barcode">

<input id="nama" placeholder="Nama Barang">

<input id="stok" type="number" placeholder="Jumlah">

<input id="rak" placeholder="Rak">

<input id="baris" placeholder="Baris">

<br>

<label>Tanggal Expired</label>

<input id="exp" type="date">

<br>

<button onclick="addItem()">Simpan</button>

</div>

<!-- SCAN -->

<div class="card" id="scan" style="display:none">

<h3>Scan Barcode</h3>

<div id="reader"></div>

<p>Barcode: <span id="scanResult"></span></p>

<button onclick="startScanner()">Mulai Scan</button>

</div>

<!-- STOK -->

<div class="card" id="stock" style="display:none">

<h3>Daftar Stok</h3>

<input id="search" placeholder="Cari..." onkeyup="searchItem()">

<table>

<thead>
<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Stok</th>
<th>Rak</th>
<th>Baris</th>
<th>Expired</th>
</tr>
</thead>

<tbody id="stockTable"></tbody>

</table>

</div>

</div>

<script>

/* =====================
DATABASE
===================== */

let items = JSON.parse(localStorage.getItem("items")) || []

let warningDays = 30   // H-30 rule

function saveDB(){

localStorage.setItem("items",JSON.stringify(items))

}

/* =====================
ADD ITEM
===================== */

function addItem(){

let item={

barcode:barcode.value,
nama:nama.value,
stok:stok.value,
rak:rak.value,
baris:baris.value,
exp:exp.value

}

items.push(item)

saveDB()

alert("Barang tersimpan")

loadStock()

}

/* =====================
LOAD STOCK
===================== */

function loadStock(){

let table=document.getElementById("stockTable")

if(!table) return

table.innerHTML=""

items.forEach(i=>{

table.innerHTML+=`

<tr>

<td>${i.barcode}</td>
<td>${i.nama}</td>
<td>${i.stok}</td>
<td>${i.rak}</td>
<td>${i.baris}</td>
<td>${i.exp}</td>

</tr>

`

})

checkAlert()

}

/* =====================
SEARCH
===================== */

function searchItem(){

let key=search.value.toLowerCase()

document.querySelectorAll("#stockTable tr").forEach(r=>{

r.style.display=r.innerText.toLowerCase().includes(key) ? "" : "none"

})

}

/* =====================
ALERT EXPIRED PANEL
===================== */

function checkAlert(){

let today=new Date()

let panel=document.getElementById("alertList")

panel.innerHTML=""

let found=false

items.forEach(i=>{

let expDate=new Date(i.exp)

let diff=(expDate - today)/(1000*60*60*24)

if(diff <= warningDays+1){

found=true

panel.innerHTML+=`

<div class="alert-item">

<b>${i.nama}</b> akan expired dalam 
<b>${Math.floor(diff)} hari</b>

(Rak ${i.rak} - Baris ${i.baris})

</div>

`

}

})

if(!found){

panel.innerHTML="Tidak ada barang mendekati expired"

}

}

/* =====================
SCANNER
===================== */

let scanner

function startScanner(){

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode: "environment" },
{ fps:10, qrbox:250 },
(code)=>{

scanResult.innerText=code

barcode.value=code

scanner.stop()

}
)

}

/* =====================
NAVIGATION
===================== */

function show(id){

["add","scan","stock"].forEach(s=>{
document.getElementById(s).style.display="none"
})

document.getElementById(id).style.display="block"

}

/* =====================
INIT
===================== */

loadStock()

</script>

</body>
</html>
