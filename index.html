<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retail Inventory</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#eef1f5;
}

header{
background:#111827;
color:white;
padding:15px;
font-size:20px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin:4px;
}

button:hover{
background:#1d4ed8;
}

input{
padding:8px;
margin:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#1f2937;
color:white;
}

#reader{
width:320px;
margin-top:10px;
}

.alert{
background:#fff3cd;
padding:10px;
border-left:6px solid orange;
border-radius:6px;
}

</style>

</head>

<body>

<header>
Retail Inventory Dashboard
</header>

<div class="container">

<div class="card alert">

<b>Barang Mendekati Expired</b>

<div id="alertList">
Belum ada barang mendekati expired
</div>

</div>

<div class="card">

<h3>Tambah Barang</h3>

<button onclick="startScanner()">Scan Barcode</button>

<div id="reader"></div>

</div>

<div class="card" id="formBarang" style="display:none">

<h3>Data Barang</h3>

<input id="barcode" placeholder="Barcode" readonly>

<input id="nama" placeholder="Nama Barang">

<input id="rak" placeholder="Rak">

<input id="baris" placeholder="Baris">

<input id="stok" type="number" placeholder="Jumlah">

<br>

<label>Expired</label>

<input id="exp" type="date">

<label>Hari Tarik Display</label>

<input id="warning" placeholder="Contoh: 30">

<br>

<button onclick="saveItem()">Simpan Barang</button>

</div>

<div class="card">

<h3>Daftar Barang</h3>
<h3>Cari Barang</h3>

<input id="searchInput" placeholder="Cari nama barang..." onkeyup="searchItem()">

<button onclick="startSearchScanner()">Scan Cari Barang</button>

<div id="readerSearch"></div>

<div id="searchResult"></div>
<table>

<thead>

<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Rak</th>
<th>Baris</th>
<th>Stok</th>
<th>Expired</th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

/* DATABASE */

let items = JSON.parse(localStorage.getItem("items")) || []

function saveDB(){

localStorage.setItem("items",JSON.stringify(items))

}

/* SIMPAN BARANG */

function saveItem(){

let item={

barcode:barcode.value,
nama:nama.value,
rak:rak.value,
baris:baris.value,
stok:stok.value,
exp:exp.value,
warning:warning.value

}

let exist = items.find(x=>x.barcode==barcode.value)

if(exist){

Object.assign(exist,item)

}else{

items.push(item)

}

saveDB()

loadItems()

alert("Barang berhasil disimpan")

/* =========================
RESET SETELAH SIMPAN
========================= */

// kosongkan semua input
barcode.value=""
nama.value=""
rak.value=""
baris.value=""
stok.value=""
exp.value=""
warning.value=""

// sembunyikan form
document.getElementById("formBarang").style.display="none"

// (opsional) kosongkan tampilan scanner
document.getElementById("reader").innerHTML=""

}

/* LOAD BARANG */

function loadItems(){

let table=document.getElementById("table")

table.innerHTML=""

items.forEach(i=>{

table.innerHTML+=`

<tr>

<td>${i.barcode}</td>
<td>${i.nama}</td>
<td>${i.rak}</td>
<td>${i.baris}</td>
<td>${i.stok}</td>
<td>${i.exp}</td>

</tr>

`

})

checkExpired()

}

/* CEK EXPIRED */

function checkExpired(){

let today=new Date()

let panel=document.getElementById("alertList")

panel.innerHTML=""

let found=false

items.forEach(i=>{

let expDate=new Date(i.exp)

let diff=(expDate-today)/(1000*60*60*24)

if(diff<=i.warning){

found=true

panel.innerHTML+=`

<div>

<b>${i.nama}</b> akan expired dalam ${Math.floor(diff)} hari

(Rak ${i.rak} Baris ${i.baris})

</div>

`

}

})

if(!found){

panel.innerHTML="Tidak ada barang mendekati expired"

}

}

/* LOAD ITEM JIKA SUDAH ADA */

function loadItem(barcodeValue){

let item=items.find(x=>x.barcode==barcodeValue)

if(item){

nama.value=item.nama
rak.value=item.rak
baris.value=item.baris
stok.value=item.stok
exp.value=item.exp
warning.value=item.warning

alert("Data barang ditemukan")

}else{

nama.value=""
rak.value=""
baris.value=""
stok.value=""
exp.value=""
warning.value="30"

alert("Barang baru, silakan isi data")

}

}

/* SCANNER */

let scanner

function startScanner(){

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode: "environment" },
{ fps:10, qrbox:250 },
(code)=>{

barcode.value = code

scanner.stop()

document.getElementById("formBarang").style.display="block"

loadItem(code)

}
)

}

/* INIT */

loadItems()

/* =========================
SEARCH BY NAMA
========================= */

function searchItem(){

let key = document.getElementById("searchInput").value.toLowerCase()

let result = document.getElementById("searchResult")

result.innerHTML = ""

items.forEach(i=>{

if(i.nama.toLowerCase().includes(key)){

result.innerHTML += `

<div onclick="pilihBarang('${i.barcode}')" style="padding:8px;border-bottom:1px solid #ddd;cursor:pointer">

<b>${i.nama}</b><br>
Rak ${i.rak} - Baris ${i.baris}

</div>

`

}

})

}

function pilihBarang(barcodeValue){

let item = items.find(x=>x.barcode==barcodeValue)

if(item){

alert(
"Nama: " + item.nama + "\n" +
"Rak: " + item.rak + "\n" +
"Baris: " + item.baris + "\n" +
"Stok: " + item.stok + "\n" +
"Expired: " + item.exp
)

}

}

let searchScanner

function startSearchScanner(){

searchScanner = new Html5Qrcode("readerSearch")

searchScanner.start(
{ facingMode: "environment" },
{ fps:10, qrbox:250 },
(code)=>{

searchScanner.stop()

let item = items.find(x=>x.barcode==code)

if(item){

alert(
"Nama: " + item.nama + "\n" +
"Rak: " + item.rak + "\n" +
"Baris: " + item.baris + "\n" +
"Stok: " + item.stok + "\n" +
"Expired: " + item.exp
)

}else{

alert("Barang tidak ditemukan")

}

}
)

}
  
</script>

</body>
</html>
