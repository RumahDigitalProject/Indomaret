<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retail Inventory Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:Segoe UI;margin:0;background:#eef1f5;}
header{background:#111827;color:white;padding:15px;font-size:20px;}
.container{padding:20px;}
.card{background:white;padding:20px;margin-bottom:20px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
button{background:#2563eb;color:white;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;margin:4px;}
input,select{padding:8px;margin:4px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px;border:1px solid #ddd;}
th{background:#1f2937;color:white;}
</style>
</head>

<body>

<header>📦 Retail Inventory System</header>

<div class="container">

<div class="card">
<h3>⚠ Notifikasi Expired</h3>
<div id="warningList"></div>
<div id="expiredList"></div>
</div>

<div class="card">
<h3>Tambah Barang</h3>
<button onclick="startScanner()">📷 Scan Barcode</button>
<div id="reader"></div>
</div>

<div class="card" id="formBarang" style="display:none">
<h3>Data Barang</h3>

<input id="barcode" readonly placeholder="Barcode">
<input id="nama" placeholder="Nama Barang">
<input id="rak" placeholder="Rak">
<input id="baris" placeholder="Baris">
<input id="stok" type="number" placeholder="Stok">

<br>

<label>Expired</label>
<input id="exp" type="date">

<label>Hari Tarik</label>
<input id="warning" placeholder="30">

<br>

<button onclick="saveItem()">💾 Simpan</button>

</div>

<div class="card">
<h3>Filter Barang</h3>
<select id="filterRak" onchange="applyFilter()"></select>
<select id="filterBaris" onchange="applyFilter()"></select>
</div>

<div class="card">
<h3>Cari Barang</h3>

<input id="searchInput" placeholder="Nama barang..." onkeydown="handleEnter(event)">
<button onclick="clearSearch()">❌</button>
<button onclick="startSearchScanner()">📷 Scan</button>

<div id="readerSearch"></div>
<div id="searchResult"></div>

</div>

<div class="card">
<h3>Daftar Barang</h3>

<table>
<thead>
<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Rak</th>
<th>Baris</th>
<th>Stok</th>
<th>Exp</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<div class="card">
<h3>Laporan</h3>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Status</th>
<th>Stok</th>
<th>Tanggal</th>
</tr>
</thead>

<tbody id="laporanTable"></tbody>
</table>

</div>

</div>

<script>

/* ELEMENT */
const el = id => document.getElementById(id)

/* DATABASE */
let items = JSON.parse(localStorage.getItem("items")) || []
let laporan = JSON.parse(localStorage.getItem("laporan")) || []

function saveDB(){ localStorage.setItem("items", JSON.stringify(items)) }
function saveLaporan(){ localStorage.setItem("laporan", JSON.stringify(laporan)) }

/* REFRESH */
function refreshAll(){
loadItems()
loadFilter()
loadLaporan()
checkExpired()
}

/* SIMPAN */
function saveItem(){

let item = {
barcode: el("barcode").value,
nama: el("nama").value,
rak: el("rak").value,
baris: el("baris").value,
stok: el("stok").value,
exp: el("exp").value,
warning: parseInt(el("warning").value || 30)
}

let exist = items.find(x => x.barcode == item.barcode)

if(exist) Object.assign(exist, item)
else items.push(item)

saveDB()

// RESET
el("formBarang").style.display="none"
el("reader").innerHTML=""

["barcode","nama","rak","baris","stok","exp","warning"].forEach(id=>el(id).value="")

alert("✅ Tersimpan")
refreshAll()
}

/* LOAD TABLE */
function loadItems(){
let table = el("table")
table.innerHTML=""

items.forEach(i=>{
table.innerHTML += `
<tr>
<td>${i.barcode}</td>
<td>${i.nama}</td>
<td>${i.rak}</td>
<td>${i.baris}</td>
<td>${i.stok}</td>
<td>${i.exp}</td>
</tr>`
})
}

/* FILTER */
function loadFilter(){
let rakSet = [...new Set(items.map(i=>i.rak))]
let barisSet = [...new Set(items.map(i=>i.baris))]

let rak = el("filterRak")
let baris = el("filterBaris")

rak.innerHTML='<option value="">Semua Rak</option>'
baris.innerHTML='<option value="">Semua Baris</option>'

rakSet.forEach(r=>rak.innerHTML+=`<option>${r}</option>`)
barisSet.forEach(b=>baris.innerHTML+=`<option>${b}</option>`)
}

function applyFilter(){
let rak = el("filterRak").value
let baris = el("filterBaris").value

let data = items.filter(i=>
(!rak || i.rak==rak) &&
(!baris || i.baris==baris)
)

let table = el("table")
table.innerHTML=""

data.forEach(i=>{
table.innerHTML+=`
<tr>
<td>${i.barcode}</td>
<td>${i.nama}</td>
<td>${i.rak}</td>
<td>${i.baris}</td>
<td>${i.stok}</td>
<td>${i.exp}</td>
</tr>`
})
}

/* SEARCH */
function handleEnter(e){
if(e.key==="Enter") searchItem()
}

function searchItem(){
let key = el("searchInput").value.toLowerCase()
let result = el("searchResult")
result.innerHTML=""

items.forEach(i=>{
if(i.nama.toLowerCase().includes(key)){
result.innerHTML+=`
<div class="card">
<b>${i.nama}</b><br>
Barcode: ${i.barcode}<br>
Rak ${i.rak} | Baris ${i.baris}<br>
Stok ${i.stok}<br>
Exp ${i.exp}<br><br>

<button onclick="editItem('${i.barcode}')">✏️ Edit</button>
<button onclick="deleteItem('${i.barcode}')">🗑 Hapus</button>
</div>`
}
})
}

function clearSearch(){
el("searchInput").value=""
el("searchResult").innerHTML=""
}

/* EDIT */
function editItem(code){
let item = items.find(x=>x.barcode==code)

el("formBarang").style.display="block"

el("barcode").value=item.barcode
el("nama").value=item.nama
el("rak").value=item.rak
el("baris").value=item.baris
el("stok").value=item.stok
el("exp").value=item.exp
el("warning").value=item.warning

window.scrollTo({top:0,behavior:"smooth"})
}

/* DELETE */
function deleteItem(code){
if(confirm("Yakin hapus?")){
items = items.filter(x=>x.barcode!=code)
saveDB()
refreshAll()
searchItem()
}
}

/* SCANNER TAMBAH */
let scanTambah = null

function startScanner(){

scanTambah = new Html5Qrcode("reader")

scanTambah.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
(code)=>{

el("barcode").value = code

scanTambah.stop()

el("formBarang").style.display="block"

let item = items.find(x=>x.barcode==code)

if(item){
el("nama").value=item.nama
el("rak").value=item.rak
el("baris").value=item.baris
el("stok").value=item.stok
el("exp").value=item.exp
el("warning").value=item.warning
}

}
)
}

/* SCAN SEARCH */
let scanCari = null

function startSearchScanner(){

scanCari = new Html5Qrcode("readerSearch")

scanCari.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
(code)=>{

scanCari.stop()

let item = items.find(x=>x.barcode==code)

if(item){

el("searchResult").innerHTML=`
<div class="card">
<b>${item.nama}</b><br>
Rak ${item.rak} | Baris ${item.baris}<br>
Stok ${item.stok}<br>
Exp ${item.exp}<br><br>

<button onclick="editItem('${item.barcode}')">✏️ Edit</button>
<button onclick="deleteItem('${item.barcode}')">🗑 Hapus</button>
</div>`

}else{
alert("Barang tidak ditemukan")
}

}
)
}

/* EXPIRED */
function checkExpired(){

let today = new Date()

el("warningList").innerHTML=""
el("expiredList").innerHTML=""

items.forEach(i=>{

let diff = Math.ceil((new Date(i.exp)-today)/86400000)

if(diff<=0){
el("expiredList").innerHTML+=`
<div class="card">
🔴 ${i.nama}
<button onclick="updateExp('${i.barcode}')">✔</button>
</div>`
}
else if(diff<=i.warning){
el("warningList").innerHTML+=`
<div class="card">
⚠ ${i.nama} (H-${diff})
<button onclick="updateExp('${i.barcode}')">✔</button>
</div>`
}

})
}

/* UPDATE */
function updateExp(code){

let item = items.find(x=>x.barcode==code)

let newExp = prompt("Exp baru (YYYY-MM-DD)")
let newStok = prompt("Stok baru")
let status = confirm("OK=Terjual | Cancel=Expired")

laporan.push({
nama:item.nama,
status:status?"terjual":"expired",
stok:newStok,
tanggal:new Date().toISOString().split("T")[0]
})

item.exp=newExp
item.stok=newStok

saveDB()
saveLaporan()
refreshAll()
}

/* LAPORAN */
function loadLaporan(){
let table = el("laporanTable")
table.innerHTML=""

laporan.forEach(l=>{
table.innerHTML+=`
<tr>
<td>${l.nama}</td>
<td>${l.status}</td>
<td>${l.stok}</td>
<td>${l.tanggal}</td>
</tr>`
})
}

/* INIT */
refreshAll()

</script>

</body>
</html>
