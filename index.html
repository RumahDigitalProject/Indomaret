<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retail Inventory Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Segoe UI;
margin:0;
background:#eef1f5;
}

header{
background:#111827;
color:white;
padding:15px;
font-size:20px;
}

.container{ padding:20px; }

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin:4px;
}

input, select{
padding:8px;
margin:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#1f2937;
color:white;
}
</style>
</head>

<body>

<header>📦 Retail Inventory System</header>

<div class="container">

<!-- NOTIF -->
<div class="card">
<h3>⚠ Notifikasi Expired</h3>

<div id="warningList"></div>
<div id="expiredList"></div>

</div>

<!-- SCAN -->
<div class="card">
<h3>Tambah Barang</h3>
<button onclick="startScanner()">📷 Scan Barcode</button>
<div id="reader"></div>
</div>

<!-- FORM -->
<div class="card" id="formBarang" style="display:none">
<h3>Data Barang</h3>

<input id="barcode" readonly placeholder="Barcode">
<input id="nama" placeholder="Nama Barang">
<input id="rak" placeholder="Rak">
<input id="baris" placeholder="Baris">
<input id="stok" type="number" placeholder="Stok">

<br>

<label>Expired</label>
<input id="exp" type="date">

<label>Hari Tarik</label>
<input id="warning" placeholder="30">

<br>

<button onclick="saveItem()">💾 Simpan</button>

</div>

<!-- FILTER -->
<div class="card">
<h3>Filter Barang</h3>

<select id="filterRak" onchange="applyFilter()"></select>
<select id="filterBaris" onchange="applyFilter()"></select>

</div>

<!-- SEARCH -->
<div class="card">
<h3>Cari Barang</h3>

<input id="searchInput" placeholder="Nama barang..." onkeydown="if(event.key==='Enter')searchItem()">
<button onclick="clearSearch()">❌</button>
<button onclick="startSearchScanner()">📷</button>

<div id="searchResult"></div>

</div>

<!-- TABLE -->
<div class="card">
<h3>Daftar Barang</h3>

<table>
<thead>
<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Rak</th>
<th>Baris</th>
<th>Stok</th>
<th>Exp</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<!-- LAPORAN -->
<div class="card">
<h3>Laporan</h3>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Status</th>
<th>Stok</th>
<th>Tanggal</th>
</tr>
</thead>

<tbody id="laporanTable"></tbody>
</table>

</div>

</div>

<script>

/* DATABASE */
let items = JSON.parse(localStorage.getItem("items")) || []
let laporan = JSON.parse(localStorage.getItem("laporan")) || []

function saveDB(){
localStorage.setItem("items",JSON.stringify(items))
}

function saveLaporan(){
localStorage.setItem("laporan",JSON.stringify(laporan))
}

/* REFRESH GLOBAL */
function refreshAll(){
loadItems()
loadFilter()
loadLaporan()
checkExpired()
}

/* SIMPAN */
function saveItem(){

let item={
barcode:barcode.value,
nama:nama.value,
rak:rak.value,
baris:baris.value,
stok:stok.value,
exp:exp.value,
warning:parseInt(warning.value)
}

let exist = items.find(x=>x.barcode==item.barcode)

if(exist) Object.assign(exist,item)
else items.push(item)

saveDB()

// RESET FORM
document.getElementById("formBarang").style.display="none"
document.getElementById("reader").innerHTML=""

barcode.value=""
nama.value=""
rak.value=""
baris.value=""
stok.value=""
exp.value=""
warning.value=""

alert("✅ Tersimpan")

refreshAll()
}

/* LOAD TABLE */
function loadItems(){
let table=document.getElementById("table")
table.innerHTML=""

items.forEach(i=>{
table.innerHTML+=`
<tr>
<td>${i.barcode}</td>
<td>${i.nama}</td>
<td>${i.rak}</td>
<td>${i.baris}</td>
<td>${i.stok}</td>
<td>${i.exp}</td>
</tr>`
})
}

/* FILTER */
function loadFilter(){
let rakSet=[...new Set(items.map(i=>i.rak))]
let barisSet=[...new Set(items.map(i=>i.baris))]

filterRak.innerHTML='<option value="">Semua Rak</option>'
filterBaris.innerHTML='<option value="">Semua Baris</option>'

rakSet.forEach(r=>filterRak.innerHTML+=`<option>${r}</option>`)
barisSet.forEach(b=>filterBaris.innerHTML+=`<option>${b}</option>`)
}

function applyFilter(){

let rak=filterRak.value
let baris=filterBaris.value

let filtered = items.filter(i=>
(!rak || i.rak==rak) &&
(!baris || i.baris==baris)
)

let table=document.getElementById("table")
table.innerHTML=""

filtered.forEach(i=>{
table.innerHTML+=`
<tr>
<td>${i.barcode}</td>
<td>${i.nama}</td>
<td>${i.rak}</td>
<td>${i.baris}</td>
<td>${i.stok}</td>
<td>${i.exp}</td>
</tr>`
})
}

/* SEARCH */
function searchItem(){

let key=searchInput.value.toLowerCase()
let result=document.getElementById("searchResult")

result.innerHTML=""

items.forEach(i=>{
if(i.nama.toLowerCase().includes(key)){
result.innerHTML+=`
<div class="card">
<b>${i.nama}</b><br>
Rak ${i.rak} | Baris ${i.baris}<br>
Stok ${i.stok}<br>
Exp ${i.exp}
</div>`
}
})

}

function clearSearch(){
searchInput.value=""
searchResult.innerHTML=""
}

/* LAPORAN */
function loadLaporan(){
let table=laporanTable
table.innerHTML=""

laporan.forEach(l=>{
table.innerHTML+=`
<tr>
<td>${l.nama}</td>
<td>${l.status}</td>
<td>${l.stok}</td>
<td>${l.tanggal}</td>
</tr>`
})
}

/* EXPIRED */
function checkExpired(){

let today=new Date()

warningList.innerHTML=""
expiredList.innerHTML=""

items.forEach(i=>{

let diff=Math.ceil((new Date(i.exp)-today)/86400000)

if(diff<=0){

expiredList.innerHTML+=`
<div class="card">
🔴 ${i.nama}<br>
<button onclick="updateExp('${i.barcode}')">✔ Update</button>
</div>`

}else if(diff<=i.warning){

warningList.innerHTML+=`
<div class="card">
⚠ ${i.nama} (H-${diff})
<button onclick="updateExp('${i.barcode}')">✔ Update</button>
</div>`
}

})
}

/* UPDATE EXP */
function updateExp(code){

let item=items.find(x=>x.barcode==code)

let newExp=prompt("Exp baru (YYYY-MM-DD)")
let newStok=prompt("Stok baru")

let status=confirm("OK = Terjual | Cancel = Expired")

laporan.push({
nama:item.nama,
status:status?"terjual":"expired",
stok:newStok,
tanggal:new Date().toISOString().split("T")[0]
})

item.exp=newExp
item.stok=newStok

saveDB()
saveLaporan()

refreshAll()
}

/* SCANNER */
function startScanner(){

let scanner=new Html5Qrcode("reader")

scanner.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },
(code)=>{

barcode.value=code
scanner.stop()

document.getElementById("formBarang").style.display="block"

let item=items.find(x=>x.barcode==code)

if(item){
nama.value=item.nama
rak.value=item.rak
baris.value=item.baris
stok.value=item.stok
exp.value=item.exp
warning.value=item.warning
}

}
)
}

/* INIT */
refreshAll()

</script>

</body>
</html>
