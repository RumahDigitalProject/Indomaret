<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retail Inventory</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#eef1f5;
}

header{
background:#111827;
color:white;
padding:15px;
font-size:20px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:18px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin:4px;
}

button:hover{
background:#1e40af;
}

input{
padding:9px;
margin:4px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#1f2937;
color:white;
}

.alert{
background:#fff3cd;
border-left:6px solid orange;
padding:10px;
border-radius:6px;
}

#reader{
width:300px;
}

.stat{
font-size:18px;
margin:4px;
}

</style>

</head>

<body>

<header>
Retail Inventory Dashboard
</header>

<div class="container">

<div class="card alert">

<b>Barang Mendekati Expired</b>

<div id="alertList">
Belum ada barang mendekati expired
</div>

</div>

<div class="card">

<div class="stat">Total Barang: <span id="total"></span></div>

<div class="stat">Hampir Expired: <span id="expCount"></span></div>

</div>

<div class="card">

<button onclick="show('add')">Tambah Barang</button>

<button onclick="show('scan')">Scan Barcode</button>

<button onclick="show('stock')">Lihat Stok</button>

</div>

<div class="card" id="add">

<h3>Tambah Barang</h3>

<input id="barcode" placeholder="Barcode">

<input id="nama" placeholder="Nama Barang">

<input id="stok" type="number" placeholder="Jumlah">

<input id="rak" placeholder="Rak">

<input id="baris" placeholder="Baris">

<br>

<label>Expired</label>

<input id="exp" type="date">

<br>

<button onclick="addItem()">Simpan</button>

</div>

<div class="card" id="scan" style="display:none">

<h3>Scan Barcode</h3>

<div id="reader"></div>

<p>Barcode: <span id="scanResult"></span></p>

<button onclick="startScanner()">Mulai Scan</button>

</div>

<div class="card" id="stock" style="display:none">

<h3>Daftar Stok</h3>

<input id="search" placeholder="Cari barang..." onkeyup="searchItem()">

<table>

<thead>

<tr>
<th>Barcode</th>
<th>Nama</th>
<th>Stok</th>
<th>Rak</th>
<th>Baris</th>
<th>Expired</th>
</tr>

</thead>

<tbody id="stockTable"></tbody>

</table>

</div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || []

let warningDays = 30

function saveDB(){

localStorage.setItem("items",JSON.stringify(items))

}

function addItem(){

let item={

barcode:barcode.value,
nama:nama.value,
stok:stok.value,
rak:rak.value,
baris:baris.value,
exp:exp.value

}

items.push(item)

saveDB()

loadData()

alert("Barang tersimpan")

}

function loadData(){

let table=document.getElementById("stockTable")

table.innerHTML=""

items.forEach(i=>{

table.innerHTML+=`

<tr>

<td>${i.barcode}</td>
<td>${i.nama}</td>
<td>${i.stok}</td>
<td>${i.rak}</td>
<td>${i.baris}</td>
<td>${i.exp}</td>

</tr>

`

})

document.getElementById("total").innerText=items.length

checkExpired()

}

function searchItem(){

let key=search.value.toLowerCase()

document.querySelectorAll("#stockTable tr").forEach(r=>{

r.style.display=r.innerText.toLowerCase().includes(key) ? "" : "none"

})

}

function checkExpired(){

let today=new Date()

let panel=document.getElementById("alertList")

panel.innerHTML=""

let count=0

items.forEach(i=>{

let expDate=new Date(i.exp)

let diff=(expDate-today)/(1000*60*60*24)

if(diff<=warningDays){

count++

panel.innerHTML+=`

<div>

${i.nama} - Expired ${Math.floor(diff)} hari lagi
(Rak ${i.rak} Baris ${i.baris})

</div>

`

}

})

if(count==0){

panel.innerHTML="Tidak ada barang mendekati expired"

}

document.getElementById("expCount").innerText=count

}

let scanner

function startScanner(){

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode: "environment" },
{ fps:10, qrbox:250 },
(code)=>{

scanResult.innerText=code

barcode.value=code

scanner.stop()

}
)

}

function show(id){

["add","scan","stock"].forEach(s=>{

document.getElementById(s).style.display="none"

})

document.getElementById(id).style.display="block"

}

loadData()

</script>

</body>
</html>
