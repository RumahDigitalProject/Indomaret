<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReturHub - Inventory & Expired Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* RESET & PENCEGAH GESER SAMPING */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden; /* Mengunci layar agar tidak geser kiri/kanan */
            touch-action: pan-y; /* Hanya izinkan scroll atas-bawah */
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a; /* Dark background */
            color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }
        
        header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        header p {
            margin: 5px 0 0;
            font-size: 12px;
            color: #bfdbfe;
        }

        /* NAVIGATION TABS */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
        }
        
        .tab-btn {
            flex: 1;
            background: #1e293b;
            color: #94a3b8;
            border: 2px solid transparent;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .tab-btn.active {
            background: rgba(37, 99, 235, 0.1);
            color: #3b82f6;
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        /* CONTAINER */
        .container {
            padding: 0 20px 80px 20px;
            width: 100%;
        }

        .page {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CARDS */
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
        }

        h2 { margin-top: 0; font-size: 18px; color: #f8fafc; }

        /* FORM INPUTS */
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .input-row {
            display: flex;
            gap: 10px;
        }
        .input-row .form-group { flex: 1; }

        /* BUTTONS */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            margin-top: 10px;
        }
        
        .btn-action {
            background: #334155;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        /* NOTIFICATION CARDS (DASHBOARD) */
        .alert-card {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }
        
        .alert-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 6px;
        }

        /* DANGER: Sudah Expired */
        .alert-danger {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
        }
        .alert-danger::before { background: #dc2626; }
        .alert-danger .badge { color: #fca5a5; }

        /* WARNING: Waktunya Tarik */
        .alert-warning {
            background: rgba(234, 179, 8, 0.1);
            border: 1px solid rgba(234, 179, 8, 0.3);
        }
        .alert-warning::before { background: #eab308; }
        .alert-warning .badge { color: #fef08a; }

        /* SAFE: Masih Aman */
        .alert-safe {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .alert-safe::before { background: #22c55e; }

        .item-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .item-location {
            font-size: 13px;
            color: #cbd5e1;
            margin-bottom: 8px;
            display: inline-flex;
            align-items: center;
            background: #0f172a;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .item-details {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
        }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.error { background: #ef4444; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4); }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }
        .empty-state text { font-size: 40px; }
    </style>
</head>
<body>

    <header>
        <h1>ReturHub</h1>
        <p>Smart Inventory Tracker</p>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard')">Notif Tarik 🔔</button>
        <button class="tab-btn" onclick="switchTab('input')">Input Data ✍️</button>
        <button class="tab-btn" onclick="switchTab('list')">List Semua 📋</button>
    </div>

    <div class="container">

        <div id="page-dashboard" class="page active">
            <div class="card">
                <h2>🚨 Tindakan Segera</h2>
                <p style="font-size:12px; color:#94a3b8; margin-top:-10px; margin-bottom:20px;">
                    Barang yang harus segera ditarik dari rak hari ini.
                </p>
                
                <div id="actionList">
                    </div>
            </div>
        </div>

        <div id="page-input" class="page">
            <div class="card">
                <h2>📦 Tambah Barang Baru</h2>
                
                <div class="form-group">
                    <label>Nama Produk</label>
                    <input type="text" id="nama" placeholder="Contoh: Chitato Sapi Panggang 68g">
                </div>

                <div class="input-row">
                    <div class="form-group">
                        <label>Jenis Modis</label>
                        <input type="text" id="modis" placeholder="Contoh: Snack">
                    </div>
                    <div class="form-group">
                        <label>Stok</label>
                        <input type="number" id="stok" placeholder="Jml">
                    </div>
                </div>

                <div class="input-row">
                    <div class="form-group">
                        <label>Shelving</label>
                        <input type="text" id="shelf" placeholder="Contoh: 3">
                    </div>
                    <div class="form-group">
                        <label>Baris</label>
                        <input type="text" id="baris" placeholder="Contoh: 1">
                    </div>
                </div>

                <div class="form-group">
                    <label>Tanggal Expired</label>
                    <input type="date" id="expDate">
                </div>

                <div class="form-group">
                    <label>Tarik H- Berapa? (Dalam Hari)</label>
                    <input type="number" id="tarikDays" placeholder="Contoh: 60 (Untuk 2 Bulan)">
                </div>

                <button class="btn-primary" onclick="simpanBarang()">Simpan Barang</button>
            </div>
        </div>

        <div id="page-list" class="page">
            <div class="card">
                <h2>📋 Semua Data Barang</h2>
                <div id="allList">
                    </div>
            </div>
        </div>

    </div>

    <div id="toast">Notifikasi</div>

    <script>
        // Inisialisasi Database
        let dbBarang = JSON.parse(localStorage.getItem('returHubDB')) || [];

        // Fungsi Navigasi Tab
        function switchTab(tabId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById('page-' + tabId).classList.add('active');
            event.target.classList.add('active');

            if(tabId === 'dashboard') renderDashboard();
            if(tabId === 'list') renderAllList();
        }

        // Fungsi Toast Notification
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = isError ? 'error show' : 'show';
            setTimeout(() => { toast.className = ''; }, 3000);
        }

        // Fungsi Simpan Barang
        function simpanBarang() {
            const nama = document.getElementById('nama').value;
            const modis = document.getElementById('modis').value;
            const shelf = document.getElementById('shelf').value;
            const baris = document.getElementById('baris').value;
            const stok = document.getElementById('stok').value;
            const expDate = document.getElementById('expDate').value;
            const tarikDays = document.getElementById('tarikDays').value;

            if(!nama || !modis || !shelf || !baris || !expDate || !tarikDays) {
                showToast("Semua kolom wajib diisi, bro!", true);
                return;
            }

            const item = {
                id: Date.now().toString(),
                nama, modis, shelf, baris, stok, expDate, tarikDays: parseInt(tarikDays)
            };

            dbBarang.push(item);
            localStorage.setItem('returHubDB', JSON.stringify(dbBarang));

            // Reset Form
            ['nama','modis','shelf','baris','stok','expDate','tarikDays'].forEach(id => {
                document.getElementById(id).value = '';
            });

            showToast("Mantap! Data berhasil disimpan.");
            renderDashboard();
        }

        // Fungsi Hapus Barang (Jika sudah ditarik/terjual habis)
        function hapusBarang(id) {
            if(confirm('Udah beres ditarik? Yakin mau hapus data ini?')) {
                dbBarang = dbBarang.filter(item => item.id !== id);
                localStorage.setItem('returHubDB', JSON.stringify(dbBarang));
                renderDashboard();
                renderAllList();
                showToast("Data berhasil dihapus.");
            }
        }

        // Format Tanggal Indo (Cth: 30 Apr 2026)
        function formatTanggal(tglString) {
            const d = new Date(tglString);
            return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        // Hitung Selisih Hari dari Hari Ini
        function hitungSelisihHari(tglTujuan) {
            const today = new Date();
            today.setHours(0,0,0,0);
            const target = new Date(tglTujuan);
            target.setHours(0,0,0,0);
            const diffTime = target - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        // Render Data Dashboard (Hanya Warning & Expired)
        function renderDashboard() {
            const listContainer = document.getElementById('actionList');
            listContainer.innerHTML = '';

            if(dbBarang.length === 0) {
                listContainer.innerHTML = `<div class="empty-state">📦<br>Belum ada data barang nih.</div>`;
                return;
            }

            // Urutkan berdasarkan tanggal expired paling dekat
            let sortedDB = [...dbBarang].sort((a,b) => new Date(a.expDate) - new Date(b.expDate));
            let adaNotif = false;

            sortedDB.forEach(item => {
                const hariMenujuExp = hitungSelisihHari(item.expDate);
                const hariHarusDitarik = item.tarikDays;
                
                let statusClass = '';
                let statusText = '';
                let showCard = false;

                if (hariMenujuExp < 0) {
                    // SUDAH LEWAT EXPIRED
                    statusClass = 'alert-danger';
                    statusText = '🔴 KADALUARSA! Buang Sekarang';
                    showCard = true;
                } else if (hariMenujuExp <= hariHarusDitarik) {
                    // HARI H PENARIKAN (Atau sudah lewat hari penarikan tapi belum expired)
                    statusClass = 'alert-warning';
                    statusText = `🟡 TARIK! (Lewat batas H-${hariHarusDitarik})`;
                    showCard = true;
                }

                if(showCard) {
                    adaNotif = true;
                    listContainer.innerHTML += `
                        <div class="alert-card ${statusClass}">
                            <div class="item-name">${item.nama} <span class="badge" style="font-size:11px; float:right;">${statusText}</span></div>
                            <div class="item-location">
                                📍 Modis: ${item.modis} | Shelf: ${item.shelf} | Baris: ${item.baris}
                            </div>
                            <div class="item-details">
                                <span>Exp: <b>${formatTanggal(item.expDate)}</b> (Sisa ${hariMenujuExp} Hari)</span>
                                <span>Stok: ${item.stok}</span>
                            </div>
                            <button class="btn-action" onclick="hapusBarang('${item.id}')">Tandai Selesai & Hapus</button>
                        </div>
                    `;
                }
            });

            if(!adaNotif) {
                listContainer.innerHTML = `<div class="empty-state">✨<br>Aman bro! Nggak ada barang yang perlu ditarik.</div>`;
            }
        }

        // Render Semua List
        function renderAllList() {
            const listContainer = document.getElementById('allList');
            listContainer.innerHTML = '';

            if(dbBarang.length === 0) {
                listContainer.innerHTML = `<div class="empty-state">📦<br>Data kosong.</div>`;
                return;
            }

            dbBarang.forEach(item => {
                const hariMenujuExp = hitungSelisihHari(item.expDate);
                let badge = (hariMenujuExp <= item.tarikDays) ? '⚠️ Segera Tarik' : '✅ Aman';
                if(hariMenujuExp < 0) badge = '❌ Expired';

                listContainer.innerHTML += `
                    <div class="alert-card alert-safe" style="border-color:#334155; background:#0f172a;">
                        <div class="item-name">${item.nama} <span style="font-size:11px; float:right;">${badge}</span></div>
                        <div class="item-location" style="background:#1e293b;">
                            📍 Modis: ${item.modis} | S: ${item.shelf} | B: ${item.baris}
                        </div>
                        <div class="item-details">
                            <span>Exp: ${formatTanggal(item.expDate)}</span>
                            <span>Aturan Tarik: H-${item.tarikDays}</span>
                        </div>
                        <button class="btn-action" style="background:#dc2626;" onclick="hapusBarang('${item.id}')">Hapus Data</button>
                    </div>
                `;
            });
        }

        // Run on load
        renderDashboard();
    </script>
</body>
</html>
